# Use random port to avoid conflicts when tests are run repeatedly
quarkus.http.test-port=0

# casehub-qhorus 0.2-SNAPSHOT embeds application.properties with casehub.qhorus.* defaults
# that Quarkus strict config validation rejects as unmapped (SRCFG00050) when the
# extension's @ConfigMapping root isn't registered during augmentation. Suppress until
# casehub-qhorus fixes its extension descriptor. See docs/BUGS-AND-ODDITIES.md.
smallrye.config.mapping.validate-unknown=false
# Point the agent's ServerClient back at the test server — avoids connection-refused
# failures in McpServerIntegrationTest when the server URL stays at the default 7777
%test.claudony.server.url=http://localhost:${quarkus.http.port}

# Index qhorus-testing jar so InMemory*Store CDI beans are discoverable
quarkus.index-dependency.qhorus-testing.group-id=io.casehub
quarkus.index-dependency.qhorus-testing.artifact-id=casehub-qhorus-testing

# Qhorus named datasource — in-memory H2 for tests (no file path, no AUTO_SERVER)
%test.quarkus.datasource.qhorus.jdbc.url=jdbc:h2:mem:claudony-qhorus-test;DB_CLOSE_ON_EXIT=FALSE
# Reactive guard for named Qhorus datasource — tests use JDBC only via InMemory*Store
%test.quarkus.datasource.qhorus.reactive=false
# Flyway disabled in tests — schema managed by Hibernate database.generation instead
%test.quarkus.flyway.qhorus.migrate-at-start=false
%test.quarkus.hibernate-orm.qhorus.database.generation=drop-and-create
