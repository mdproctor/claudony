# Mode: server | agent
claudony.mode=server
claudony.port=7777
claudony.bind=localhost
claudony.server.url=http://localhost:7777
claudony.claude-command=claude
claudony.tmux-prefix=claudony-
claudony.terminal=auto

quarkus.http.port=${claudony.port}
quarkus.http.host=${claudony.bind}

# Logging
quarkus.log.level=INFO
quarkus.log.category."dev.claudony".level=DEBUG

# REST client for Agent → Server calls
quarkus.rest-client.claudony-server.url=${claudony.server.url}
quarkus.rest-client.claudony-server.connect-timeout=5000
quarkus.rest-client.claudony-server.read-timeout=10000

# PeerClient — base URL is overridden per-peer at runtime via RestClientBuilder.newBuilder()
# This placeholder satisfies Quarkus compile-time config validation only
quarkus.rest-client.peer-client.url=http://localhost:7777
quarkus.rest-client.peer-client.connect-timeout=3000
quarkus.rest-client.peer-client.read-timeout=2000

# WebAuthn relying party (override in production via env vars)
# Production: QUARKUS_WEBAUTHN_RELYING_PARTY_ID=your-domain.com
#             QUARKUS_WEBAUTHN_RELYING_PARTY_NAME=Claudony
#             QUARKUS_WEBAUTHN_ORIGIN=https://your-domain.com
quarkus.webauthn.relying-party.id=localhost
quarkus.webauthn.relying-party.name=Claudony
quarkus.webauthn.origins=http://localhost:7777
quarkus.webauthn.attestation=direct
quarkus.webauthn.login-page=/auth/login
# Session inactivity timeout — how long a login stays valid without activity.
# Default: 7 days (P7D). Override via CLAUDONY_SESSION_TIMEOUT env var.
quarkus.webauthn.session-timeout=${claudony.session-timeout}

# Cookie renewal interval — how often an active session's cookie Max-Age is refreshed.
# 1H: reduces unnecessary cookie regeneration vs. the Quarkus default of 1 minute.
# Note: keep this value well below claudony.session-timeout. The effective idle expiry
# is (session-timeout - new-cookie-interval) in the worst case, because the cookie
# timestamp is encoded in the cookie itself rather than tracked server-side.
quarkus.webauthn.new-cookie-interval=1H

# Expiry policy for idle tmux sessions. Available: user-interaction, terminal-output, status-aware
# user-interaction: expires based on last user input/WebSocket open
# terminal-output: expires based on last tmux pane activity (tmux's clock)
# status-aware: never expires if a non-shell process is running; falls back to user-interaction
claudony.session-expiry-policy=user-interaction

# Cookie encryption key — used to encrypt persistent auth cookies (WebAuthn sessions)
# Dev/test: fixed key in application.properties so sessions survive restarts locally.
# Prod: auto-generated unique key via EncryptionKeyConfigSource, persisted to
#       ~/.claudony/encryption-key (rw------- permissions) on first server run.
# Override any profile: set QUARKUS_HTTP_AUTH_SESSION_ENCRYPTION_KEY env var (takes precedence).
%dev.quarkus.http.auth.session.encryption-key=WDvVpqyk2J-CdtTj6FTpEIus7ofJ9Wh0eZUysCwEuZc
%test.quarkus.http.auth.session.encryption-key=test-encryption-key-not-for-prod-1234567

# Path-level auth — REST API and WebSocket require authentication
quarkus.http.auth.permission.protected.paths=/api/*,/ws/*,/app/*
quarkus.http.auth.permission.protected.policy=authenticated
quarkus.http.auth.permission.open.paths=/auth/*,/q/*
quarkus.http.auth.permission.open.policy=permit

# Dev profile: fixed API key for quick dev login (remove before production)
%dev.claudony.agent.api-key=dev-key-local-only
# Test profile: fixed API key so ApiKeyAuthTest can test the mechanism
%test.claudony.agent.api-key=test-api-key-do-not-use-in-prod
# Test profile: fixed fleet key so FleetKeyAuthTest can test the mechanism
%test.claudony.fleet-key=test-fleet-key-do-not-use-in-prod

# Mesh observation panel
claudony.mesh.refresh-strategy=poll
claudony.mesh.refresh-interval=3000
%test.claudony.mesh.refresh-strategy=poll
%test.claudony.mesh.refresh-interval=3000

# Fleet configuration — optional, for multi-instance deployments
# claudony.peers=http://mac-mini:7777,http://vps.example.com:7777
# claudony.fleet-key=   (generate with POST /api/peers/generate-fleet-key)
# claudony.mdns-discovery=false
# claudony.name=Claudony

# ── Qhorus named persistence unit ────────────────────────────────────────────
quarkus.datasource.qhorus.db-kind=h2
quarkus.datasource.qhorus.jdbc.url=jdbc:h2:file:~/.claudony/qhorus;DB_CLOSE_ON_EXIT=FALSE;AUTO_SERVER=TRUE
quarkus.hibernate-orm.qhorus.datasource=qhorus
quarkus.hibernate-orm.qhorus.packages=io.casehub.qhorus.runtime,io.casehub.ledger.runtime.model,io.casehub.ledger.model
quarkus.flyway.qhorus.migrate-at-start=true

# MCP server info — quarkus-mcp-server defaults to artifactId; pin the name after module rename
quarkus.mcp.server.server-info.name=claudony

# Qhorus feature flags
casehub.qhorus.enabled=true
casehub.qhorus.a2a.enabled=false
casehub.qhorus.watchdog.enabled=false

# casehub-ledger
casehub.ledger.enabled=true
casehub.ledger.hash-chain.enabled=true
casehub.ledger.trust-score.enabled=false
# Use the named qhorus persistence unit — Claudony has no default datasource
casehub.ledger.datasource=qhorus

# ── Multi-module CDI bean indexing ────────────────────────────────────────────
# claudony-core beans (TmuxService, SessionRegistry, etc.) need explicit indexing
# since they're in a library JAR without Jandex. Without this, Quarkus CDI
# cannot discover @ApplicationScoped beans from claudony-core.
quarkus.index-dependency.claudony-core.group-id=dev.claudony
quarkus.index-dependency.claudony-core.artifact-id=claudony-core
quarkus.index-dependency.claudony-casehub.group-id=dev.claudony
quarkus.index-dependency.claudony-casehub.artifact-id=claudony-casehub

# casehub-ledger ships CaseLedgerEntry (entity — needed) plus two CDI beans that
# conflict in Claudony: CaseLedgerEntryRepository clashes with the casehub-ledger
# LedgerEntryRepository, and CaseLedgerEventCapture injects it. Exclude the beans;
# keep the entity for JpaCaseLineageQuery's JPQL queries.
quarkus.arc.exclude-types=io.casehub.ledger.repository.CaseLedgerEntryRepository,io.casehub.ledger.service.CaseLedgerEventCapture
