<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#1e1e1e">
    <title>RemoteCC Terminal</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5/css/xterm.css">
    <link rel="stylesheet" href="/app/style.css">
</head>
<body class="terminal-page">
    <header class="terminal-header">
        <a href="/app/" id="back-btn">&#8592; Dashboard</a>
        <span id="session-name">Session</span>
        <span id="status-badge" class="badge idle">connecting</span>
        <button id="compose-btn" class="compose-btn" title="Compose text (Ctrl+G)">Compose</button>
        <button id="ch-toggle-btn" class="compose-btn" title="Toggle channel panel (Ctrl+K)">Channels</button>
    </header>

    <div id="session-layout">
        <div id="terminal-container"></div>

        <aside id="channel-panel" class="channel-panel collapsed" aria-label="Qhorus channel">
            <div class="ch-panel-header">
                <select id="ch-select" class="ch-select" aria-label="Select channel">
                    <option value="">— select channel —</option>
                </select>
                <button id="ch-close-btn" class="ch-close-btn" title="Close">&#10005;</button>
            </div>
            <div id="ch-feed" class="ch-feed" aria-live="polite" aria-label="Channel messages"></div>
            <div class="ch-dock">
                <div class="ch-dock-row">
                    <select id="ch-type-select" class="ch-type-select" aria-label="Message type">
                        <option value="event">EVENT — observation</option>
                        <option value="command">COMMAND — directive</option>
                        <option value="query">QUERY — request info</option>
                        <option value="status">STATUS — update</option>
                        <option value="response">RESPONSE — answer</option>
                        <option value="done">DONE — completed</option>
                        <option value="decline">DECLINE — refuse</option>
                        <option value="handoff">HANDOFF — delegate</option>
                    </select>
                </div>
                <textarea id="ch-input" class="ch-input" rows="2" placeholder="Type your message…" aria-label="Message content"></textarea>
                <div class="ch-dock-footer">
                    <button id="ch-send-btn" class="ch-send-btn" disabled>Send</button>
                    <span id="ch-error" class="ch-error" aria-live="assertive"></span>
                </div>
            </div>
        </aside>
    </div>

    <div id="key-bar" class="key-bar hidden">
        <button data-code="&#x1b;">Esc</button>
        <button data-code="&#x03;">Ctrl+C</button>
        <button data-code="&#x04;">Ctrl+D</button>
        <button data-code="&#x09;">Tab</button>
        <button data-code="`">` </button>
        <button data-code="|">|</button>
        <button data-code="~">~</button>
        <button data-code="&#x1b;[A">&#8593;</button>
        <button data-code="&#x1b;[B">&#8595;</button>
        <button data-code="&#x1b;[C">&#8594;</button>
        <button data-code="&#x1b;[D">&#8592;</button>
        <button id="compose-key-btn">Compose</button>
    </div>

    <div id="compose-overlay" class="compose-overlay hidden">
        <div class="compose-dialog">
            <div class="compose-header">
                <span>Compose</span>
                <span class="compose-hint">Ctrl+Enter to send · Esc to cancel</span>
            </div>
            <textarea id="compose-textarea" class="compose-textarea" placeholder="Type your message here — full mouse editing supported" rows="6" spellcheck="false"></textarea>
            <div class="compose-actions">
                <button id="compose-send-btn" class="compose-send">Send</button>
                <button id="compose-cancel-btn" class="compose-cancel">Cancel</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5/lib/xterm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-attach@0.11/lib/addon-attach.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10/lib/addon-fit.js"></script>
    <script src="/app/terminal.js"></script>
    <script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js');
    }
    </script>
</body>
</html>
