# Mode: server | agent
remotecc.mode=server
remotecc.port=7777
remotecc.bind=localhost
remotecc.server.url=http://localhost:7777
remotecc.claude-command=claude
remotecc.tmux-prefix=remotecc-
remotecc.terminal=auto

quarkus.http.port=${remotecc.port}
quarkus.http.host=${remotecc.bind}

# Logging
quarkus.log.level=INFO
quarkus.log.category."dev.remotecc".level=DEBUG

# REST client for Agent → Server calls
quarkus.rest-client.remotecc-server.url=${remotecc.server.url}

# WebAuthn relying party (override in production via env vars)
# Production: QUARKUS_WEBAUTHN_RELYING_PARTY_ID=your-domain.com
#             QUARKUS_WEBAUTHN_RELYING_PARTY_NAME=RemoteCC
#             QUARKUS_WEBAUTHN_ORIGIN=https://your-domain.com
quarkus.webauthn.relying-party.id=localhost
quarkus.webauthn.relying-party.name=RemoteCC
quarkus.webauthn.origin=http://localhost:7777
quarkus.webauthn.attestation=direct
quarkus.webauthn.login-page=/auth/login

# Cookie encryption key — used to encrypt persistent auth cookies (WebAuthn sessions)
# Production: set QUARKUS_HTTP_AUTH_SESSION_ENCRYPTION_KEY env var to a secret (>16 chars)
# Dev: fixed key so sessions survive restarts during development
%dev.quarkus.http.auth.session.encryption-key=WDvVpqyk2J-CdtTj6FTpEIus7ofJ9Wh0eZUysCwEuZc
%test.quarkus.http.auth.session.encryption-key=test-encryption-key-not-for-prod-1234567
# Local testing without env var: stable key so auth cookie survives dev server restarts
# Override in production with QUARKUS_HTTP_AUTH_SESSION_ENCRYPTION_KEY env var
%prod.quarkus.http.auth.session.encryption-key=XrK9mP2vLq8nT5wY3jH7bN4cF6dA1eZ0

# Path-level auth — REST API and WebSocket require authentication
quarkus.http.auth.permission.protected.paths=/api/*,/ws/*,/app/*
quarkus.http.auth.permission.protected.policy=authenticated
quarkus.http.auth.permission.open.paths=/auth/*,/q/*
quarkus.http.auth.permission.open.policy=permit

# Dev profile: fixed API key for quick dev login (remove before production)
%dev.remotecc.agent.api-key=dev-key-local-only
# Test profile: fixed API key so ApiKeyAuthTest can test the mechanism
%test.remotecc.agent.api-key=test-api-key-do-not-use-in-prod
