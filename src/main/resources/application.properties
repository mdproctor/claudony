# Mode: server | agent
remotecc.mode=server
remotecc.port=7777
remotecc.bind=localhost
remotecc.server.url=http://localhost:7777
remotecc.claude-command=claude
remotecc.tmux-prefix=remotecc-
remotecc.terminal=auto

quarkus.http.port=${remotecc.port}
quarkus.http.host=${remotecc.bind}

# Logging
quarkus.log.level=INFO
quarkus.log.category."dev.remotecc".level=DEBUG

# REST client for Agent → Server calls
quarkus.rest-client.remotecc-server.url=${remotecc.server.url}

# WebAuthn relying party (override in production via env vars)
# Production: QUARKUS_WEBAUTHN_RP_ID=your-domain.com
#             QUARKUS_WEBAUTHN_RP_NAME=RemoteCC
#             QUARKUS_WEBAUTHN_ORIGINS=https://your-domain.com
quarkus.webauthn.rp.id=localhost
quarkus.webauthn.rp.name=RemoteCC
quarkus.webauthn.origins=http://localhost:7777

# Path-level auth — REST API and WebSocket require authentication
quarkus.http.auth.permission.protected.paths=/api/*,/ws/*,/app/*
quarkus.http.auth.permission.protected.policy=authenticated
quarkus.http.auth.permission.open.paths=/auth/*,/q/*
quarkus.http.auth.permission.open.policy=permit

# Dev profile: fixed API key for quick dev login (remove before production)
%dev.remotecc.agent.api-key=dev-key-local-only
# Test profile: fixed API key so ApiKeyAuthTest can test the mechanism
%test.remotecc.agent.api-key=test-api-key-do-not-use-in-prod
