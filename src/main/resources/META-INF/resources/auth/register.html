<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RemoteCC — Register</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #1a1a1a; color: #e0e0e0;
           display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
    .card { background: #2a2a2a; border-radius: 12px; padding: 2rem; width: 320px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.4); }
    h1 { margin: 0 0 0.5rem; font-size: 1.4rem; color: #fff; }
    p { color: #aaa; font-size: 0.9rem; margin: 0 0 1.5rem; }
    label { display: block; margin-bottom: 0.4rem; font-size: 0.85rem; color: #aaa; }
    input { width: 100%; padding: 0.6rem 0.8rem; border-radius: 6px; border: 1px solid #444;
            background: #1a1a1a; color: #e0e0e0; font-size: 1rem; box-sizing: border-box; }
    button { width: 100%; padding: 0.75rem; margin-top: 1rem; border-radius: 6px; border: none;
             background: #4c9aff; color: #fff; font-size: 1rem; cursor: pointer; font-weight: 600; }
    button:hover { background: #3a89f0; }
    .error { color: #ff6b6b; font-size: 0.85rem; margin-top: 0.75rem; display: none; }
  </style>
</head>
<body>
<div class="card">
  <h1>Create Passkey</h1>
  <p>Choose a username. Your passkey will be saved to iCloud Keychain.</p>
  <label for="username">Username</label>
  <input id="username" type="text" placeholder="Your name" autocomplete="username">
  <button onclick="register()">Register with Passkey</button>
  <div class="error" id="error"></div>
</div>
<script>
function b64uToBuffer(b64u) {
  const b64 = b64u.replace(/-/g, '+').replace(/_/g, '/');
  const bin = atob(b64);
  const buf = new ArrayBuffer(bin.length);
  const u8 = new Uint8Array(buf);
  for (let i = 0; i < bin.length; i++) u8[i] = bin.charCodeAt(i);
  return buf;
}

function bufToB64u(buf) {
  const u8 = new Uint8Array(buf);
  let bin = '';
  u8.forEach(b => bin += String.fromCharCode(b));
  return btoa(bin).replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
}

async function register() {
  const err = document.getElementById('error');
  err.style.display = 'none';
  const username = document.getElementById('username').value.trim();
  if (!username) { showError('Enter a username'); return; }

  try {
    const optRes = await fetch('/q/webauthn/register', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({name: username, displayName: username})
    });
    if (!optRes.ok) { showError('Server error getting registration options'); return; }
    const opts = await optRes.json();

    opts.challenge = b64uToBuffer(opts.challenge);
    opts.user.id = b64uToBuffer(opts.user.id);
    if (opts.excludeCredentials) {
      opts.excludeCredentials = opts.excludeCredentials.map(c => ({...c, id: b64uToBuffer(c.id)}));
    }

    const cred = await navigator.credentials.create({publicKey: opts});

    const body = {
      id: cred.id,
      rawId: bufToB64u(cred.rawId),
      response: {
        attestationObject: bufToB64u(cred.response.attestationObject),
        clientDataJSON: bufToB64u(cred.response.clientDataJSON),
        transports: cred.response.getTransports ? cred.response.getTransports() : []
      },
      type: cred.type
    };

    const finishRes = await fetch('/q/webauthn/callback', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(body)
    });
    if (finishRes.ok) {
      window.location.href = '/app/';
    } else {
      showError('Registration failed — try again or use a different username');
    }
  } catch (e) {
    showError(e.name === 'NotAllowedError' ? 'Cancelled' : e.message);
  }
}

function showError(msg) {
  const err = document.getElementById('error');
  err.textContent = msg;
  err.style.display = 'block';
}
</script>
</body>
</html>
